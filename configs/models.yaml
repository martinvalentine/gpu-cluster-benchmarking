# ============================================================
# Model Download & Endpoint Configuration
# ============================================================
# Optimized for: 5× NVIDIA A40 48GB + 300GB RAM
# Target: Stable 1000-2000 CCU, prompt length 500-16000 tokens
# Priority: Stability > Throughput (headroom KV cache, chunked prefill)

# Usage:
# uv run python scripts/download-models.py
# uv run python scripts/gen-litellm-config.py
# uv run python scripts/bench-models.sh --phase p0 p1 --concurrent 1200 ...

# ============================================================
# ── Cluster Configuration (5× NVIDIA A40) ─────────────────────
cluster:
  gpu_count: 5
  vllm:
    tp: 5
    gpu_mem_util: "0.85"          # Headroom cho KV cache lớn (16k context)
    max_model_len: 16384
    max_num_seqs: 1024
    max_batched_tokens: 65536
    block_size: 16
    dtype: auto
    swap_space: 64                # Tránh OOM khi burst cao
    enforce_eager: false
    distributed_executor: mp
    enable_chunked_prefill: true
    enable_prefix_caching: true

  llamacpp:
    n_parallel: 48                # Conservative cho stability
    ctx_size: 16384
    n_gpu_layers: all
    tensor_split: "1,1,1,1,1"    # 5 GPUs
    batch: 8192
    ubatch: 2048
    threads: 48
    cache_key: q8_0
    cache_val: turbo4
    flash_attn: on
    cache_prompt: true

# Benchmark dataset
dataset:
  sharegpt: /workspace/datasets/sharegpt.json

# Base directory
base_dir: /workspace/models

# Default ports
ports:
  vllm: 8000
  llamacpp: 8001
  sglang: 8002
  embedding: 8003
  proxy: 4000

models:
  # ── Embedding Model ───────────────────────────────────────
  - name: qwen3-embedding
    repo_id: Qwen/Qwen3-Embedding-0.6B-GGUF
    local_dir: gguf/qwen3-embedding-0.6b
    format: gguf
    include: "*Q8_0.gguf"
    enabled: true
    phase: embedding
    backend: llamacpp
    proxy_name: embedding-model
    endpoint: true
    api_port: 8003

  # ── Phase P0: Ultra-Light (0.5B) ───────────────────────────
  - name: qwen0.5b
    repo_id: Qwen/Qwen2.5-0.5B-Instruct
    local_dir: hf/qwen2.5-0.6b
    format: hf
    enabled: true
    phase: p0
    backend: vllm
    proxy_name: qwen0.5b-vllm
    endpoint: true
    vllm_tp: 1
    vllm_gpu_mem: "0.75"
    vllm_max_seqs: 1536
    vllm_max_batched_tokens: 65536

  - name: qwen0.5b-gguf
    repo_id: Qwen/Qwen2.5-0.5B-Instruct-GGUF
    local_dir: gguf/qwen2.5-0.6b
    format: gguf
    include: "*q4_k_m.gguf"
    enabled: true
    phase: p0
    backend: llamacpp
    proxy_name: qwen0.5b-llamacpp
    endpoint: true
    llamacpp_n_parallel: 128
    llamacpp_tensor_split: "1,1,1,1,1"
    llamacpp_ctx_size: 16384
    llamacpp_batch: 8192
    llamacpp_ubatch: 2048
    llamacpp_threads: 48
    llamacpp_cache_key: q8_0
    llamacpp_cache_val: turbo4
    llamacpp_flash_attn: on
    llamacpp_cache_prompt: true

  # ── Phase P1: Light (7B) ───────────────────────────────────
  - name: qwen7b
    repo_id: Qwen/Qwen2.5-7B-Instruct
    local_dir: hf/qwen2.5-7b
    format: hf
    enabled: true
    phase: p1
    backend: vllm
    proxy_name: qwen7b-vllm
    endpoint: true
    vllm_tp: 1
    vllm_gpu_mem: "0.82"
    vllm_max_seqs: 768
    vllm_max_batched_tokens: 65536
    vllm_max_model_len: 16384

  - name: qwen7b-gguf
    repo_id: Qwen/Qwen2.5-7B-Instruct-GGUF
    local_dir: gguf/qwen2.5-7b
    format: gguf
    include: "*q4_k_m*"
    enabled: true
    phase: p1
    backend: llamacpp
    proxy_name: qwen7b-llamacpp
    endpoint: true
    llamacpp_n_parallel: 64
    llamacpp_tensor_split: "1,1,1,1,1"
    llamacpp_ctx_size: 16384
    llamacpp_batch: 8192
    llamacpp_ubatch: 2048
    llamacpp_threads: 48
    llamacpp_cache_key: q8_0
    llamacpp_cache_val: turbo4
    llamacpp_flash_attn: on
    llamacpp_cache_prompt: true

  # ── Phase P2: Medium (14B) ─────────────────────────────────
  - name: qwen14b
    repo_id: Qwen/Qwen2.5-14B-Instruct
    local_dir: hf/qwen2.5-14b
    format: hf
    enabled: false
    phase: p2
    backend: vllm
    proxy_name: qwen14b-vllm
    endpoint: true
    vllm_tp: 2
    vllm_gpu_mem: "0.85"
    vllm_max_seqs: 256

  - name: qwen14b-gguf
    repo_id: Qwen/Qwen2.5-14B-Instruct-GGUF
    local_dir: gguf/qwen2.5-14b
    format: gguf
    include: "*q4_k_m*"
    enabled: true
    phase: p2
    backend: llamacpp
    proxy_name: qwen14b-llamacpp
    endpoint: true
    llamacpp_n_parallel: 32
    llamacpp_tensor_split: "1,1,1,1,1"
    llamacpp_ctx_size: 16384
    llamacpp_batch: 8192
    llamacpp_ubatch: 2048
    llamacpp_threads: 48
    llamacpp_cache_key: q8_0
    llamacpp_cache_val: turbo4
    llamacpp_flash_attn: on
    llamacpp_cache_prompt: true

  # ── Phase P3: Heavy (32B) ──────────────────────────────────
  - name: qwen32b
    repo_id: Qwen/Qwen2.5-32B-Instruct
    local_dir: hf/qwen2.5-32b
    format: hf
    enabled: true
    phase: p3
    backend: vllm
    proxy_name: qwen32b-vllm
    endpoint: true
    vllm_tp: 5                     # Full 5 GPUs
    vllm_gpu_mem: "0.82"           # Headroom KV cache
    vllm_max_seqs: 192             # Conservative cho 32B + 16k
    vllm_max_batched_tokens: 32768
    vllm_max_model_len: 16384
    vllm_enable_chunked_prefill: true
    vllm_enable_prefix_caching: true

  - name: qwen32b-gguf
    repo_id: Qwen/Qwen2.5-32B-Instruct-GGUF
    local_dir: gguf/qwen2.5-32b
    format: gguf
    include: "qwen2.5-32b-instruct-q4_k_m*"
    enabled: true
    phase: p3
    backend: llamacpp
    proxy_name: qwen32b-llamacpp
    endpoint: true
    llamacpp_n_parallel: 12        # Thấp để ổn định
    llamacpp_tensor_split: "1,1,1,1,1"
    llamacpp_ctx_size: 16384
    llamacpp_batch: 8192
    llamacpp_ubatch: 2048
    llamacpp_threads: 48
    llamacpp_cache_key: q8_0
    llamacpp_cache_val: turbo4
    llamacpp_flash_attn: on
    llamacpp_cache_prompt: true
