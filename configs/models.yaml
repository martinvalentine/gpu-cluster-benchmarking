# ============================================================
# Model Download & Endpoint Configuration
# ============================================================
# Single source of truth for:
#   1. Which models to download (download-models.py)
#   2. Which endpoints to route through LiteLLM proxy (gen-litellm-config.py)
#   3. Which servers to start (start-all-tmux.sh)
#
# Usage:
#   uv run python scripts/download-models.py                         # Download all enabled
#   uv run python scripts/download-models.py --only qwen0.5b        # Download specific
#   uv run python scripts/download-models.py --phase p0              # Download by phase
#   uv run python scripts/download-models.py --dry-run               # Preview
#   uv run python scripts/gen-litellm-config.py                      # Regenerate proxy config
#
# Models organized by benchmark phase:
#   P0 Ultra-Light:  0.6B  (fast iteration, CI)
#   P1 Light:        1.5B  (baseline multi-user)
#   P2 Medium:       3B    (production small)
#   P3 Heavy:        7B    (production standard)
#
# Endpoint routing:
#   Each model can specify `endpoint` to route through the LiteLLM proxy.
#   Set `endpoint: false` to skip proxy routing for that model.
#   The `proxy_name` becomes the model name clients use via the proxy.
# ============================================================

# Base directory for all models (relative to project root)
base_dir: models

# Default backend ports (used by gen-litellm-config.py)
ports:
  vllm: 8000
  llamacpp: 8001
  sglang: 8002
  embedding: 8003
  proxy: 4000

models:
  # ── Embedding Model (for LiteLLM semantic cache) ────────────
  - name: qwen3-embedding
    repo_id: Qwen/Qwen3-Embedding-0.6B-GGUF
    local_dir: gguf/qwen3-embedding-0.6b
    format: gguf
    include: "*Q8_0.gguf"
    enabled: true
    phase: embedding
    # Endpoint routing
    backend: llamacpp
    proxy_name: embedding-model
    endpoint: true

  # ── Phase P0: Ultra-Light (0.6B) ────────────────────────────
  - name: qwen0.5b
    repo_id: Qwen/Qwen2.5-0.5B-Instruct
    local_dir: hf/qwen2.5-0.6b
    format: hf
    enabled: true
    phase: p0
    # Endpoint routing
    backend: vllm
    proxy_name: qwen0.5b-vllm
    endpoint: true

  - name: qwen0.5b-gguf
    repo_id: Qwen/Qwen2.5-0.5B-Instruct-GGUF
    local_dir: gguf/qwen2.5-0.6b
    format: gguf
    include: "*q4_k_m.gguf"
    enabled: true
    phase: p0
    # Endpoint routing
    backend: llamacpp
    proxy_name: qwen0.5b-llamacpp
    endpoint: true

  # ── Phase P1: Light (1.5B) ──────────────────────────────────
  - name: qwen1.5b
    repo_id: Qwen/Qwen2.5-1.5B-Instruct
    local_dir: hf/qwen2.5-1.5b
    format: hf
    enabled: false
    phase: p1
    backend: vllm
    proxy_name: qwen1.5b-vllm
    endpoint: true

  - name: qwen1.5b-gguf
    repo_id: Qwen/Qwen2.5-1.5B-Instruct-GGUF
    local_dir: gguf/qwen2.5-1.5b
    format: gguf
    include: "*q4_k_m.gguf"
    enabled: false
    phase: p1
    backend: llamacpp
    proxy_name: qwen1.5b-llamacpp
    endpoint: true

  # ── Phase P2: Medium (3B) ───────────────────────────────────
  - name: qwen3b
    repo_id: Qwen/Qwen2.5-3B-Instruct
    local_dir: hf/qwen2.5-3b
    format: hf
    enabled: false
    phase: p2
    backend: vllm
    proxy_name: qwen3b-vllm
    endpoint: true

  - name: qwen3b-gguf
    repo_id: Qwen/Qwen2.5-3B-Instruct-GGUF
    local_dir: gguf/qwen2.5-3b
    format: gguf
    include: "*q4_k_m.gguf"
    enabled: false
    phase: p2
    backend: llamacpp
    proxy_name: qwen3b-llamacpp
    endpoint: true

  # ── Phase P3: Heavy (7B) ────────────────────────────────────
  - name: qwen7b
    repo_id: Qwen/Qwen2.5-7B-Instruct
    local_dir: hf/qwen2.5-7b
    format: hf
    enabled: false
    phase: p3
    backend: vllm
    proxy_name: qwen7b-vllm
    endpoint: true

  - name: qwen7b-gguf
    repo_id: Qwen/Qwen2.5-7B-Instruct-GGUF
    local_dir: gguf/qwen2.5-7b
    format: gguf
    include: "*q4_k_m.gguf"
    enabled: false
    phase: p3
    backend: llamacpp
    proxy_name: qwen7b-llamacpp
    endpoint: true
