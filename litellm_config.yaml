model_list:
  # llama-cpp-turboquant (port 8001)
  - model_name: qwen35b-llamacpp
    litellm_params:
      model: openai/Qwen3.6-35B-A3B-UDT-Q5_K_XL_MTP
      api_base: http://localhost:8001/v1
      api_key: EMPTY

  # vLLM (port 8000)
  - model_name: qwen35b-vllm
    litellm_params:
      model: openai/Qwen3.6-35B-A3B
      api_base: http://localhost:8000/v1
      api_key: EMPTY

  # SGLang (port 8002)
  - model_name: qwen35b-sglang
    litellm_params:
      model: openai/Qwen3.6-35B-A3B
      api_base: http://localhost:8002/v1
      api_key: EMPTY

  # Embedding model for semantic cache (llama-cpp-turboquant on port 8003)
  # Uncomment when Redis Stack (with RediSearch) is installed:
  # - model_name: embedding-model
  #   litellm_params:
  #     model: openai/embedding-model
  #     api_base: http://localhost:8003/v1
  #     api_key: EMPTY

# Load Balancer routing
router_settings:
  routing_strategy: least-busy

litellm_settings:
  set_verbose: false
  num_retries: 2
  request_timeout: 120
  success_callback: ["prometheus"]
  failure_callback: ["prometheus"]

  # Cache: basic Redis (no RediSearch needed)
  # Switch to redis-semantic after installing Redis Stack:
  #   sudo apt-get install redis-stack-server
  cache: true
  cache_params:
    type: redis
    host: localhost
    port: 6379
    ttl: 3600
